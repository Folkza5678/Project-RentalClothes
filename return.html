<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Return & QC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/return.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header class="TopBar">
  <a href="main.html" class="TopBar-logo">
    <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
    <span class="Logo-text">RENTAL CLOTHES</span>
  </a>
  <div class="TopBar-actions">
    <a href="main.html" class="BtnFaq" title="main">
      <img src="images/eye.png" alt="main" style="width: 40px; height: 40px; object-fit: contain;" />
    </a>
    <a href="login.html" class="BtnLogin"><span class="BtnLogin-text">LOGIN</span></a>
  </div>
</header>

<div class="Layout">
  <aside class="Sidebar">
    <div class="Sidebar-profile">
      <div class="Profile-avatar">👤</div>
      <div class="Profile-info">
        <div class="Profile-name">ADMIN</div>
        <div class="Profile-role">PRODUCTION SUPPORT</div>
      </div>
    </div>
    <nav class="Sidebar-nav">
      <a href="dashboard.html" class="NavItem">DASHBOARD</a>
      <a href="productmanagement.html" class="NavItem">PRODUCTS</a>
      <a href="booking.html" class="NavItem">BOOKING</a>
      <a href="return.html" class="NavItem NavItem--active">RETURN</a>
      <a href="cus.html" class="NavItem">CUSTOMERS</a>
      <a href="report.html" class="NavItem NavItem--last">REPORTS</a>
    </nav>
  </aside>

  <main class="MainContent">
    <div class="PageTitleRow">
      <h1 class="PageTitle">RETURN &amp; QUALITY CONTROL</h1>
    </div>

    <div class="StatRow">
      <div class="StatCard"><div class="StatCard-label">รอรับคืนทั้งหมด</div><div class="StatCard-value" id="statRetTotal">0</div></div>
      <div class="StatCard StatCard--pending"><div class="StatCard-label">รอตรวจสอบ</div><div class="StatCard-value" id="statRetPending">0</div></div>
      <div class="StatCard StatCard--pass"><div class="StatCard-label">ผ่านการตรวจ</div><div class="StatCard-value" id="statRetPass">0</div></div>
      <div class="StatCard StatCard--defect"><div class="StatCard-label">พบตำหนิ</div><div class="StatCard-value" id="statRetDefect">0</div></div>
    </div>

    <div class="Toolbar">
      <div class="Toolbar-search">
        <span class="Toolbar-search-icon">🔍</span>
        <input type="text" class="Toolbar-input" id="searchInput" placeholder="ค้นชื่อลูกค้า, เลข Order..." />
      </div>
      <select class="Toolbar-filter" id="filterQC">
        <option value="">ทุกสถานะ QC</option>
        <option value="pending">รอตรวจสอบ</option>
        <option value="pass">ผ่าน</option>
        <option value="defect">พบตำหนิ</option>
      </select>
    </div>

    <div class="TableCard">
      <table class="DataTable">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>ลูกค้า</th>
            <th>สินค้า</th>
            <th>วันที่ต้องคืน</th>
            <th>สถานะ QC</th>
            <th>มัดจำ</th>
            <th style="width:100px">จัดการ</th>
          </tr>
        </thead>
        <tbody id="returnTableBody">
          </tbody>
      </table>
    </div>
  </main>
</div>

<div class="Modal-overlay" id="returnModal">
  <div class="Modal">
    <div class="Modal-header">
      <span class="Modal-title" id="modalTitle">ตรวจรับคืนสินค้า</span>
      <button class="Modal-close" onclick="closeReturnModal()">✕</button>
    </div>
    <div class="Modal-body" id="modalReturnContent">
      </div>
    <div class="Modal-footer">
      <button class="BtnSecondary" onclick="closeReturnModal()">ปิด</button>
      <button class="BtnConfirmReturn" id="btnConfirmAction">✅ ยืนยันรับคืน</button>
    </div>
  </div>
</div>

<script src="template/api.js"></script>
<script src="template/return-admin.js"></script>
<script>
  function closeReturnModal() { document.getElementById('returnModal').classList.remove('open'); }
</script>
</body>
</html>
