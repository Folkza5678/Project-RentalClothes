<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes – Register</title>
  
  <script>
    // 🛡️ เช็คทุกครั้งที่หน้าโผล่ (รวมถึงตอนกด Back)
    window.onpageshow = function(event) {
        if (localStorage.getItem('isLoggedIn') === 'true' || localStorage.getItem('token')) {
            window.location.replace('main.html');
        }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Headland+One&family=Hedvig+Letters+Serif&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/rental.css" />
  <link rel="stylesheet" href="template/login.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .swal2-popup { font-family: 'Hanuman', serif !important; }
  </style>
</head>
<body>
<div class="Page">

  <header class="SiteHeader">
    <div class="SiteHeader-top">
      <a href="main.html" class="SiteHeader-logo">
        <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
        <span class="Logo-text">RENTAL CLOTHES</span>
      </a>
      <div class="SiteHeader-actions">
        <a href="faq.html" class="Icon-faq-link" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
        <a href="login.html" class="BtnLogin">
          <span class="BtnLogin-text">LOGIN</span>
        </a>
      </div>
    </div>

    <nav class="Navbar">
      <a href="main.html"      class="NavBtn">HOME</a>
      <a href="rental.html"    class="NavBtn">RENTAL PRODUCTS</a>
      <a href="howtorent.html" class="NavBtn">HOW TO RENT</a>
      <a href="review.html"    class="NavBtn">REVIEW</a>
      <a href="article.html"   class="NavBtn">ARTICLE</a>
      <a href="contact.html"   class="NavBtn">CONTACT</a>
      <a href="gallery.html"   class="NavBtn">GALLERY</a>
    </nav>
  </header>

  <main class="LoginPage">
    <h1 class="LoginPage-title">RENTAL CLOTHES</h1>

    <div class="LoginCard">
      <div class="LoginCard-left">
        <img class="LoginCard-logo" src="images/logo.png" alt="Rental Clothes logo" />
        <div class="LoginCard-rc">
          <span class="LoginCard-letter">R</span>
          <span class="LoginCard-letter LoginCard-letter--c">C</span>
        </div>
        <p class="LoginCard-brand">RENTAL CLOTHES</p>
      </div>

      <div class="LoginCard-right">
        <h2 class="LoginForm-title">Register</h2>

        <form class="LoginForm" action="#" method="post">
          <div class="LoginForm-group">
            <label class="LoginForm-label" for="username">Username <span class="LoginForm-required">*</span></label>
            <input class="LoginForm-input" type="text" id="username" name="username" placeholder="Username..." required />
          </div>

          <div class="LoginForm-group">
            <label class="LoginForm-label" for="email">Email <span class="LoginForm-required">*</span></label>
            <input class="LoginForm-input" type="email" id="email" name="email" placeholder="Email..." required />
          </div>

          <div class="LoginForm-group">
            <label class="LoginForm-label" for="full_name">Full Name <span class="LoginForm-required">*</span></label>
            <input class="LoginForm-input" type="text" id="full_name" name="full_name" placeholder="Full Name..." required />
          </div>

          <div class="LoginForm-group">
            <label class="LoginForm-label" for="password">Password <span class="LoginForm-required">*</span></label>
            <input class="LoginForm-input" type="password" id="password" name="password" placeholder="Password..." required />
          </div>

          <div class="LoginForm-group">
            <label class="LoginForm-label" for="confirm-password">Confirm password <span class="LoginForm-required">*</span></label>
            <input class="LoginForm-input" type="password" id="confirm-password" name="confirm_password" placeholder="Confirm password..." required />
          </div>

          <p class="LoginForm-signup">
            Already have an account? <a href="login.html" class="LoginForm-signup-link">Login</a>
          </p>

          <button class="LoginForm-submit" type="submit">REGISTER</button>

          <p class="LoginForm-terms">
            การดำเนินการต่อแสดงว่าคุณยอมรับข้อตกลงการใช้บริการ 
            <a href="policy.html" class="LoginForm-terms-link">นโยบายส่วนตัวของเรา</a>
          </p>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  document.querySelector('.LoginForm').addEventListener('submit', async function(event) {
    event.preventDefault(); 

    const form = event.target;
    const username = form.username.value;
    const email = form.email.value;
    const full_name = form.full_name.value;
    const password = form.password.value;
    const confirmPassword = form.confirm_password.value;

    // 1. เช็ครหัสผ่านตรงกันไหม (ฝั่ง Client)
    if (password !== confirmPassword) {
      Swal.fire({
        icon: 'warning',
        title: 'รหัสผ่านไม่ตรงกัน',
        text: 'กรุณาตรวจสอบการยืนยันรหัสผ่านอีกครั้ง',
        confirmButtonColor: '#114e72'
      });
      return;
    }

    try {
      Swal.fire({
        title: 'กำลังสร้างบัญชี...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading() }
      });

      // 2. ✨ แก้จุดสำคัญ: เปลี่ยนจาก '/register.html' เป็น '/api/register'
      const response = await fetch('/api/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json' // ระบุว่าเป็น JSON
        },
        body: JSON.stringify({
          username: username,
          email: email,
          full_name: full_name,
          password: password
        })
      });

      // 3. เช็คว่า Response เป็น JSON หรือไม่ (ป้องกัน Error 405/500 ที่พ่น HTML กลับมา)
      const contentType = response.headers.get("content-type");
      if (!contentType || !contentType.includes("application/json")) {
          throw new Error("เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง (ส่งค่ากลับไม่ใช่ JSON)");
      }

      const data = await response.json();

      if (data.success) {
        // ✅ สมัครสำเร็จ เก็บค่าลง LocalStorage
        localStorage.setItem('token', data.token);
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', username);

        Swal.fire({
          icon: 'success',
          title: 'สมัครสมาชิกสำเร็จ!',
          text: 'ยินดีต้อนรับเข้าสู่ Rental Clothes ครับ',
          timer: 1500,
          showConfirmButton: false
        }).then(() => {
          window.location.replace('main.html'); 
        });
      } else {
        // ❌ สมัครไม่สำเร็จ (เช่น Username ซ้ำ)
        Swal.fire({
          icon: 'error',
          title: 'สมัครสมาชิกไม่สำเร็จ',
          text: data.message || 'ข้อมูลไม่ถูกต้อง',
          confirmButtonColor: '#114e72'
        });
      }
    } catch (error) {
      console.error('Error:', error);
      Swal.fire({
        icon: 'error',
        title: 'เกิดข้อผิดพลาด',
        text: 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ หรือเซิร์ฟเวอร์มีปัญหา',
        confirmButtonColor: '#114e72'
      });
    }
  });
</script>
</body>
</html>
