<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@700;900&family=Headland+One&family=Hedvig+Letters+Serif&family=Radley&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="main.css" />
</head>
<body>

<div class="Main">

  <!-- ── Header ── -->
  <header class="SiteHeader">

    <!-- Top bar: icons + login -->
    <div class="TopBar">
      <div class="TopBar-icons">
        <img class="Image1" src="https://placehold.co/54x54" alt="icon 1" />
        <img class="Image2" src="https://placehold.co/41x41" alt="icon 2" />
      </div>
      <div class="Rectangle8">
        <span class="Login">LOGIN</span>
      </div>
    </div>

    <!-- Hero content -->
    <div class="HeroArea">
      <div class="HeroText">
        <div class="HeroR-top">R </div>
        <div class="HeroC-top">C</div>
        <div class="HeroSubtitle-top">RENTAL CLOTHES</div>
      </div>
      <img class="HeroImage" src="https://placehold.co/217x220" alt="hero fashion" />
    </div>

    <!-- Navbar -->
    <nav class="Navbar">
      <a href="#" class="NavBtn NavBtn--active">HOME</a>
      <a href="#" class="NavBtn">RENTAL PRODUCTS</a>
      <a href="#" class="NavBtn">HOW TO RENT</a>
      <a href="#" class="NavBtn">REVIEW</a>
      <a href="#" class="NavBtn">ARTICLE</a>
      <a href="#" class="NavBtn">CONTACT</a>
    </nav>

  </header>

  <!-- ── Body Section ── -->
  <section class="BodySection">
    <img class="BodyImage" src="https://placehold.co/1440x606" alt="body background" />

    <!-- Hero Text overlay (navy) -->
    <div class="HeroR-bottom">R </div>
    <div class="HeroC-bottom">C</div>
    <div class="HeroSubtitle-bottom">RENTAL CLOTHES</div>

    <!-- Carousel Arrows -->
    <div class="ArrowNext">&gt;</div>
    <div class="ArrowPrev">&lt;</div>
  </section>

</div>

</body>
</html>
