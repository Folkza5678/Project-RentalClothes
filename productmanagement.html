<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Product Management</title>
  <script>
    if (localStorage.getItem('userRole') !== 'admin') window.location.replace('login.html');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/productmanagement.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* เพิ่ม CSS เล็กน้อยเพื่อให้ Dropdown ในตารางดูสวยขึ้น */
    .StatusSelect {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-family: 'Hanuman', serif;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s;
    }
    .StatusSelect--available { background-color: #e6fffa; color: #2d3748; border-color: #b2f5ea; }
    .StatusSelect--booked { background-color: #fffaf0; color: #2d3748; border-color: #fbd38d; }
    .StatusSelect--washing { background-color: #ebf8ff; color: #2d3748; border-color: #bee3f8; }
    .StatusSelect--damaged { background-color: #fff5f5; color: #2d3748; border-color: #feb2b2; }
  </style>
</head>
<body>

<header class="TopBar">
  <a href="main.html" class="TopBar-logo">
    <img class="Logo-img" src="images/logo.png" alt="Logo" />
    <span class="Logo-text">RENTAL CLOTHES</span>
  </a>
</header>

<div class="Layout">
  <aside class="Sidebar">
    <div class="Sidebar-profile">
      <div class="Profile-avatar">👤</div>
      <div class="Profile-info">
        <div class="Profile-name" id="adminNameDisplay">ADMIN</div>
        <div class="Profile-role">PRODUCT MANAGER</div>
      </div>
    </div>
    <nav class="Sidebar-nav">
      <a href="dashboard.html" class="NavItem">DASHBOARD</a>
      <a href="productmanagement.html" class="NavItem NavItem--active">PRODUCTS</a>
      <a href="booking.html" class="NavItem">BOOKING</a>
      <a href="return.html" class="NavItem">RETURN</a>
      <a href="cus.html" class="NavItem">CUSTOMERS</a>
      <a href="report.html" class="NavItem">REPORTS</a>
    </nav>
  </aside>

  <main class="MainContent">
    <div class="PageTitleRow">
      <h1 class="PageTitle">PRODUCT MANAGEMENT</h1>
      <button class="BtnAddProduct" onclick="openProductModal()">＋ เพิ่มสินค้าใหม่</button>
    </div>

    <div class="StatRow">
      <div class="StatCard"><div class="StatCard-label">พร้อมเช่า</div><div class="StatCard-value" id="countAvailable">0</div></div>
      <div class="StatCard"><div class="StatCard-label">ถูกจอง</div><div class="StatCard-value" id="countBooked">0</div></div>
      <div class="StatCard"><div class="StatCard-label">ส่งซัก</div><div class="StatCard-value" id="countWashing">0</div></div>
      <div class="StatCard"><div class="StatCard-label">ชำรุด</div><div class="StatCard-value" id="countDamaged">0</div></div>
    </div>

    <div class="TableCard">
      <table class="DataTable">
        <thead>
          <tr>
            <th>#</th>
            <th>รูป / ชื่อชุด</th>
            <th>หมวดหมู่ / โอกาส</th>
            <th>สต็อก</th>
            <th>สถานะ (เปลี่ยนได้)</th>
            <th>ค่าเช่า</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="productTableBody">
            </tbody>
      </table>
    </div>
  </main>
</div>

<div class="Modal-overlay" id="productModal">
  <div class="Modal">
    <form id="productForm">
      <div class="Modal-header">
        <span class="Modal-title" id="modalTitle">เพิ่มสินค้าใหม่</span>
        <button type="button" class="Modal-close" onclick="closeProductModal()">✕</button>
      </div>
      <div class="Modal-body">
        <input type="hidden" id="productId"> 
        
        <div class="FormGroup">
          <label class="FormLabel">รูปภาพสินค้า</label>
          <input type="file" id="fileInput" name="image" accept="image/*" class="FormControl" onchange="previewImage(this)" />
          <div id="imagePreview" style="margin-top:10px;"></div>
        </div>

        <div class="FormGroup">
          <label class="FormLabel">ชื่อชุด *</label>
          <input type="text" id="inputName" name="name" class="FormControl" required />
        </div>
        
        <div class="FormGroup">
          <label class="FormLabel">คำอธิบาย</label>
          <textarea id="inputDescription" name="description" class="FormControl" rows="2"></textarea>
        </div>

        <div class="FormGrid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
          <div class="FormGroup">
            <label class="FormLabel">หมวดหมู่</label>
            <select id="inputCategory" name="category" class="FormControl">
              <option value="thai">ชุดไทย</option>
              <option value="evening">ราตรี</option>
              <option value="suit">สูท</option>
              <option value="cosplay">คอสเพลย์</option>
            </select>
          </div>
          <div class="FormGroup">
            <label class="FormLabel">โอกาส / งาน</label>
            <select id="inputOccasion" name="occasion" class="FormControl">
              <option value="wedding">งานแต่งงาน</option>
              <option value="party">งานปาร์ตี้</option>
              <option value="ceremony">งานพิธีการ</option>
              <option value="casual">งานทั่วไป</option>
            </select>
          </div>
          <div class="FormGroup">
            <label class="FormLabel">แบรนด์</label>
            <input type="text" id="inputBrand" name="brand" class="FormControl" />
          </div>
        </div>

        <div class="FormGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
           <div class="FormGroup">
            <label class="FormLabel">จำนวนในสต็อก (Stock)</label>
            <input type="number" id="inputStock" name="stock" class="FormControl" value="1" min="0" />
          </div>
          <div class="FormGroup">
            <label class="FormLabel">สถานะเริ่มต้น</label>
            <select id="inputStatus" name="status" class="FormControl">
                <option value="available">พร้อมเช่า</option>
                <option value="booked">ถูกจองอยู่</option>
                <option value="washing">ส่งซัก</option>
                <option value="damaged">ชำรุด</option>
            </select>
          </div>
        </div>

        <div class="FormGrid" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;">
          <div class="FormGroup"><label>ราคา (รายวัน) *</label><input type="number" id="priceDay" name="price_per_day" class="FormControl" required /></div>
          <div class="FormGroup"><label>ราคา (3วัน)</label><input type="number" id="price3d" name="price_3d" class="FormControl" /></div>
          <div class="FormGroup"><label>ราคา (7วัน)</label><input type="number" id="price7d" name="price_7d" class="FormControl" /></div>
          <div class="FormGroup"><label>มัดจำ *</label><input type="number" id="priceDeposit" name="deposit" class="FormControl" required /></div>
        </div>

        <div class="FormGroup">
            <label class="FormLabel">ไซส์ที่มี (ระบุเช่น S,M,L)</label>
            <input type="text" id="inputSizes" name="sizes" class="FormControl" placeholder="S, M, L, XL" />
        </div>
      </div>

      <div class="Modal-footer">
        <button type="button" class="BtnCancel" onclick="closeProductModal()">ยกเลิก</button>
        <button type="submit" class="BtnSave">💾 บันทึกข้อมูลสินค้า</button>
      </div>
    </form>
  </div>
</div>

<script src="template/product-management.js"></script>
<script>
    // ส่วนควบคุม Modal และ Preview รูปภาพ
    function openProductModal() {
        editingId = null;
        document.getElementById('productForm').reset();
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('modalTitle').textContent = 'เพิ่มสินค้าใหม่';
        document.getElementById('productModal').classList.add('open');
    }
    function closeProductModal() { document.getElementById('productModal').classList.remove('open'); }
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.createElement('img');
                img.src = e.target.result; img.style.width = '80px'; img.style.borderRadius = '5px';
                preview.appendChild(img);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
