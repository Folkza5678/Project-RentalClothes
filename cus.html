<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Customer Management</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="template/cus.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* บังคับฟอนต์ให้ทำงานทุกจุด */
    body, button, input, select, textarea {
      font-family: 'Hanuman', serif !important;
    }
  </style>
</head>
<body>

<header class="TopBar">
  <a href="main.html" class="TopBar-logo">
    <img class="Logo-img" src="images/logo.png" alt="logo" />
    <span class="Logo-text">RENTAL CLOTHES</span>
  </a>
</header>

<div class="Layout">
  <aside class="Sidebar">
    <div class="Sidebar-profile">
      <div class="Profile-avatar">👤</div>
      <div class="Profile-info">
        <div class="Profile-name">ADMIN</div>
      </div>
    </div>
    <nav class="Sidebar-nav">
      <a href="dashboard.html" class="NavItem">DASHBOARD</a>
      <a href="productmanagement.html" class="NavItem">PRODUCTS</a>
      <a href="booking.html" class="NavItem">BOOKING</a>
      <a href="return.html" class="NavItem">RETURN</a>
      <a href="cus.html" class="NavItem NavItem--active">CUSTOMERS</a>
      <a href="report.html" class="NavItem NavItem--last">REPORTS</a>
      
      <a href="javascript:void(0)" onclick="handleLogout()" class="NavItem" style="color: #ff4d4d; border-top: 1px solid rgba(255,255,255,0.2); margin-top: auto;">
        LOGOUT
      </a>
    </nav>
  </aside>

  <main class="MainContent">
    <div class="PageTitleRow">
      <h1 class="PageTitle">CUSTOMER MANAGEMENT</h1>
    </div>

    <div class="StatRow">
      <div class="StatCard">
        <div class="StatCard-label">สมาชิกทั้งหมด</div>
        <div class="StatCard-value" id="statCusTotal">0</div>
      </div>
      <div class="StatCard StatCard--vip">
        <div class="StatCard-label">VIP</div>
        <div class="StatCard-value" id="statCusVip">0</div>
      </div>
      <div class="StatCard StatCard--black">
        <div class="StatCard-label">Blacklist</div>
        <div class="StatCard-value" id="statCusBlack">0</div>
      </div>
    </div>

    <div class="TabRow">
      <button class="Tab active" id="tabAll" onclick="switchTab('all')">👥 สมาชิกทั้งหมด</button>
      <button class="Tab Tab--danger" id="tabBlack" onclick="switchTab('blacklist')">🚫 Blacklist</button>
    </div>

    <div class="Panel active" id="panelAll">
      <div class="Toolbar">
        <div class="Toolbar-search">
          <span class="Toolbar-search-icon">🔍</span>
          <input type="text" class="Toolbar-input" id="searchCus" placeholder="ค้นชื่อลูกค้า, เบอร์โทร..." oninput="loadCustomers()" />
        </div>
      </div>
      
      <div class="TableCard" style="margin-top: 20px;">
        <table class="DataTable" style="width: 100%;">
          <thead>
            <tr>
              <th>ลูกค้า</th>
              <th>เบอร์โทร</th>
              <th>ระดับ (Role)</th>
              <th>เช่าแล้ว</th>
              <th>ยอดสะสม</th>
              <th style="width:100px">จัดการ</th>
            </tr>
          </thead>
          <tbody id="customerGrid"></tbody>
        </table>
      </div>
    </div>

    <div class="Panel" id="panelBlacklist">
      <div class="TableCard">
        <table class="DataTable">
          <thead>
            <tr>
              <th>ลูกค้า</th>
              <th>เหตุผลที่ติด Blacklist</th>
              <th>วันที่บันทึก</th>
              <th style="width:100px">จัดการ</th>
            </tr>
          </thead>
          <tbody id="blacklistBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="Modal-overlay" id="customerModal">
  <div class="Modal">
    <div class="Modal-header">
      <span class="Modal-title" id="modalTitle">ข้อมูลลูกค้า</span>
      <button class="Modal-close" onclick="closeCusModal()">✕</button>
    </div>
    <div class="Modal-body" id="modalCusBody">
      </div>
    <div class="Modal-footer">
      <button class="BtnSecondary" onclick="closeCusModal()">ปิด</button>
      <button class="BtnBlacklist" id="btnBlacklistAction" style="background:#c0392b; color:white; border:none; padding:10px 20px; border-radius:20px;">🚫 ขึ้น Blacklist</button>
    </div>
  </div>
</div>

<script src="template/api.js"></script>
<script src="template/customers-admin.js"></script>
<script src="auth.js"></script> <script>
  function switchTab(tab) {
    document.getElementById('panelAll').classList.toggle('active', tab === 'all');
    document.getElementById('panelBlacklist').classList.toggle('active', tab === 'blacklist');
    document.getElementById('tabAll').classList.toggle('active', tab === 'all');
    document.getElementById('tabBlack').classList.toggle('active', tab === 'blacklist');
    
    if(tab === 'blacklist') loadBlacklist(); 
    else loadCustomers();
  }
  
  function closeCusModal() { 
    document.getElementById('customerModal').classList.remove('open'); 
  }
</script>
</body>
</html>
