<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Customer Management</title>
  <link rel="stylesheet" href="template/cus.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header class="TopBar">
  <a href="main.html" class="TopBar-logo">
    <img class="Logo-img" src="images/logo.png" alt="logo" />
    <span class="Logo-text">RENTAL CLOTHES</span>
  </a>
</header>

<div class="Layout">
  <aside class="Sidebar">
    <div class="Sidebar-profile">
      <div class="Profile-avatar">👤</div>
      <div class="Profile-info">
        <div class="Profile-name">ADMIN</div>
        <div class="Profile-role">PRODUCTION SUPPORT</div>
      </div>
    </div>
    <nav class="Sidebar-nav">
      <a href="dashboard.html" class="NavItem">DASHBOARD</a>
      <a href="productmanagement.html" class="NavItem">PRODUCTS</a>
      <a href="booking.html" class="NavItem">BOOKING</a>
      <a href="return.html" class="NavItem">RETURN</a>
      <a href="customers.html" class="NavItem NavItem--active">CUSTOMERS</a>
      <a href="report.html" class="NavItem NavItem--last">REPORTS</a>
    </nav>
  </aside>

  <main class="MainContent">
    <div class="PageTitleRow">
      <h1 class="PageTitle">CUSTOMER MANAGEMENT</h1>
    </div>

    <div class="StatRow">
      <div class="StatCard"><div class="StatCard-label">สมาชิกทั้งหมด</div><div class="StatCard-value" id="statCusTotal">0</div></div>
      <div class="StatCard StatCard--vip"><div class="StatCard-label">VIP</div><div class="StatCard-value" id="statCusVip">0</div></div>
      <div class="StatCard StatCard--black"><div class="StatCard-label">Blacklist</div><div class="StatCard-value" id="statCusBlack">0</div></div>
    </div>

    <div class="TabRow">
      <button class="Tab active" id="tabAll" onclick="switchTab('all')">👥 สมาชิกทั้งหมด</button>
      <button class="Tab Tab--danger" id="tabBlack" onclick="switchTab('blacklist')">🚫 Blacklist</button>
    </div>

    <div class="Panel active" id="panelAll">
      <div class="Toolbar">
        <input type="text" class="Toolbar-input" id="searchCus" placeholder="ค้นชื่อ, เบอร์..." oninput="loadCustomers()" />
      </div>
      
      <div class="TableCard" style="margin-top: 20px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #f8fafd; text-align: left; border-bottom: 2px solid #eee;">
              <th style="padding: 15px;">ลูกค้า</th>
              <th style="padding: 15px;">เบอร์โทร</th>
              <th style="padding: 15px;">ระดับ (Role)</th>
              <th style="padding: 15px;">เช่าแล้ว</th>
              <th style="padding: 15px;">ยอดสะสม</th>
              <th style="padding: 15px;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="customerGrid"></tbody>
        </table>
      </div>
    </div>

    <div class="Panel" id="panelBlacklist">
      <div class="TableCard">
        <table class="DataTable">
          <thead>
            <tr>
              <th>ลูกค้า</th>
              <th>เหตุผล</th>
              <th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="blacklistBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="Modal-overlay" id="customerModal">
  <div class="Modal">
    <div class="Modal-header">
      <span class="Modal-title" id="modalTitle">ข้อมูลลูกค้า</span>
      <button class="Modal-close" onclick="closeCusModal()">✕</button>
    </div>
    <div class="Modal-body" id="modalCusBody"></div>
    <div class="Modal-footer">
      <button class="BtnSecondary" onclick="closeCusModal()">ปิด</button>
      <button class="BtnBlacklist" id="btnBlacklistAction">🚫 ขึ้น Blacklist</button>
    </div>
  </div>
</div>

<script src="template/api.js"></script>
<script src="template/customers-admin.js"></script>
<script>
  function switchTab(tab) {
    document.getElementById('panelAll').classList.toggle('active', tab === 'all');
    document.getElementById('panelBlacklist').classList.toggle('active', tab === 'blacklist');
    document.getElementById('tabAll').classList.toggle('active', tab === 'all');
    document.getElementById('tabBlack').classList.toggle('active', tab === 'blacklist');
  }
  function closeCusModal() { document.getElementById('customerModal').classList.remove('open'); }
</script>
</body>
</html>
