<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes – Product Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/rental.css" />
  <link rel="stylesheet" href="template/rent.css" />
  <style>
    /* สไตล์เพิ่มเติมสำหรับข้อมูลที่ฟิกจาก DB */
    .PD-info-badge {
      display: inline-block;
      padding: 5px 15px;
      background: #f0f4f7;
      border-radius: 8px;
      font-weight: 700;
      color: #114E72;
      border: 1px solid #dce3ea;
    }
    .PD-btn-rent {
      width: 100% !important; /* ขยายปุ่มเช่าให้เต็มพื้นที่แทนที่ตะกร้า */
      height: 55px;
      font-size: 18px;
      font-weight: 900;
      background: #114E72;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .PD-btn-rent:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="Page">

  <header class="SiteHeader">
    <div class="SiteHeader-top">
      <a href="main.html" class="SiteHeader-logo">
        <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
        <span class="Logo-text">RENTAL CLOTHES</span>
      </a>
      <div class="SiteHeader-actions">
        <a href="faq.html" class="Icon-faq-link" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
        <a href="login.html" class="BtnLogin">
          <span class="BtnLogin-text">LOGIN</span>
        </a>
      </div>
    </div>
    <nav class="Navbar">
      <a href="main.html" class="NavBtn">HOME</a>
      <a href="rental.html" class="NavBtn NavBtn--active">RENTAL PRODUCTS</a>
      <a href="howtorent.html" class="NavBtn">HOW TO RENT</a>
      <a href="review.html" class="NavBtn">REVIEW</a>
      <a href="article.html" class="NavBtn">ARTICLE</a>
      <a href="contact.html" class="NavBtn">CONTACT</a>
      <a href="gallery.html" class="NavBtn">GALLERY</a>
    </nav>
  </header>

  <main class="ProductDetailPage">
    <div class="ProductDetail">

      <div class="ProductDetail-gallery">
        <div class="Gallery-main">
          <img id="mainImage" src="images/logo.png" alt="Product main image" />
        </div>
        <div class="Gallery-thumbs" id="thumbContainer">
            </div>
      </div>

      <div class="ProductDetail-info">
        <h1 class="PD-title" id="pdTitle">กำลังโหลดชื่อสินค้า...</h1>

        <div class="PD-rating">
          <span class="PD-stars"></span>
          <span class="PD-rating-score"></span>
          <span class="PD-divider">|</span>
          <span class="PD-reviews"></span>
        </div>

        <div class="PD-price-block">
          <span class="PD-price" id="pdPrice">0 ฿</span>
          <span class="PD-price-original" id="pdOriginalPrice">0 ฿</span>
          <span class="PD-discount">-25%</span>
        </div>

        <hr class="PD-divider-line" />

        <div class="PD-option-group">
          <span class="PD-option-label">ขนาดสินค้า</span>
          <div id="sizeDisplay" class="PD-info-badge">-</div>
        </div>

        <div class="PD-option-group">
          <span class="PD-option-label">จำนวนที่พร้อมเช่า</span>
          <div class="PD-qty">
            <button class="PD-qty-btn" onclick="changeQty(-1)">−</button>
            <span class="PD-qty-val" id="qtyVal">1</span>
            <button class="PD-qty-btn" id="btnAddQty" onclick="changeQty(1)">+</button>
          </div>
          <small style="color: #666; margin-left: 10px;">คงเหลือในสต็อก: <span id="stockCount">0</span> ชิ้น</small>
        </div>

        <hr class="PD-divider-line" />

        <div class="PD-info-row">
          <span class="PD-info-label">การจัดส่ง</span>
          <span class="PD-info-value">จัดส่งฟรีทั่วประเทศ · รับภายใน 1–3 วัน</span>
        </div>
        <div class="PD-info-row">
          <span class="PD-info-label">การดูแล</span>
          <span class="PD-info-value">ทำความสะอาดด้วยมาตรฐานโรงแรมก่อนจัดส่งทุกครั้ง</span>
        </div>

        <hr class="PD-divider-line" />

        <div class="PD-actions">
          <button class="PD-btn-rent" id="btnRentAction">จองคิวเช่าชุดนี้</button>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  let currentProduct = null;
  let maxStock = 1;

  async function loadProductDetail() {
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    if (!productId) { window.location.href = 'rental.html'; return; }

    try {
      const response = await fetch(`/api/products/${productId}`);
      const result = await response.json();

      if (result.success) {
        currentProduct = result.data;
        maxStock = currentProduct.stock || 1;
        renderProductInfo(currentProduct);
      } else {
        Swal.fire('ผิดพลาด', 'ไม่พบข้อมูลสินค้า', 'error').then(() => {
            window.location.href = 'rental.html';
        });
      }
    } catch (err) {
      console.error("Error loading product:", err);
    }
  }

  function renderProductInfo(p) {
    document.getElementById('pdTitle').textContent = p.name;
    document.title = 'Rental Clothes – ' + p.name;

    const price = Number(p.price_per_day || 0);
    document.getElementById('pdPrice').textContent = price.toLocaleString() + ' ฿';
    document.getElementById('pdOriginalPrice').textContent = Math.round(price * 1.3).toLocaleString() + ' ฿';

    document.getElementById('mainImage').src = p.image_url;
    document.getElementById('sizeDisplay').textContent = p.sizes || p.size || 'Free Size';
    document.getElementById('stockCount').textContent = maxStock;
    
    // ถ้าของหมด ให้ปิดปุ่มเช่า
    if (maxStock <= 0) {
        const btn = document.getElementById('btnRentAction');
        btn.textContent = 'สินค้าหมดชั่วคราว';
        btn.style.background = '#ccc';
        btn.disabled = true;
    }
  }

  function changeQty(delta) {
    const el = document.getElementById('qtyVal');
    let val = parseInt(el.textContent) + delta;
    
    if (val < 1) val = 1;
    if (val > maxStock) {
        Swal.fire('ขออภัย', `สินค้านี้มีในสต็อกเพียง ${maxStock} ชิ้นครับ`, 'info');
        val = maxStock;
    }
    el.textContent = val;
  }

  document.addEventListener("DOMContentLoaded", function() {
    loadProductDetail();

    const rentBtn = document.getElementById('btnRentAction');
    rentBtn.addEventListener('click', async function() {
        const token = localStorage.getItem('token');
        if (!token) {
            const result = await Swal.fire({
                icon: 'warning',
                title: 'กรุณาเข้าสู่ระบบ',
                text: 'คุณต้องเข้าสู่ระบบก่อนทำการจองชุดครับ',
                confirmButtonText: 'ไปหน้า Login',
                showCancelButton: true,
                confirmButtonColor: '#114E72'
            });
            if (result.isConfirmed) window.location.href = 'login.html';
            return;
        }

        const qty = document.getElementById('qtyVal').textContent;
        // ส่งไปหน้า Checkout โดยตัด Duration ออก เพราะจะไปเลือกวันที่ในหน้าถัดไปเอง
        window.location.href = `checkout.html?id=${currentProduct.id}&qty=${qty}`;
    });
  });
</script>
<script src="user.js"></script>
</body>
</html>
