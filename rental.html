<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes – Rental Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Headland+One&family=Hedvig+Letters+Serif&family=Radley&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/rental.css" />
</head>
<body>
<div class="Page">

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="SiteHeader">
    <div class="SiteHeader-top">
      <a href="main.html" class="SiteHeader-logo">
        <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
        <span class="Logo-text">RENTAL CLOTHES</span>
      </a>
      <div class="SiteHeader-actions">
        <a href="faq.html" class="Icon-faq-link" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
        <a href="login.html" class="BtnLogin">
          <span class="BtnLogin-text">LOGIN</span>
        </a>
      </div>
    </div>
    <nav class="Navbar">
      <a href="main.html"      class="NavBtn">HOME</a>
      <a href="rental.html"    class="NavBtn NavBtn--active">RENTAL PRODUCTS</a>
      <a href="howtorent.html" class="NavBtn">HOW TO RENT</a>
      <a href="review.html"    class="NavBtn">REVIEW</a>
      <a href="article.html"   class="NavBtn">ARTICLE</a>
      <a href="contact.html"   class="NavBtn">CONTACT</a>
      <a href="gallery.html"   class="NavBtn">GALLERY</a>
    </nav>
  </header>

  <!-- ══════════════ MAIN CONTENT ══════════════ -->
  <div class="Content">

    <!-- ── Sidebar ── -->
    <aside class="Sidebar">
      <div class="Filter-section">
        <h3 class="Filter-title">TYPE</h3>
        <div class="Filter-search">
          <input type="text" placeholder="Search groups..." class="Filter-input" />
        </div>
        <ul class="Filter-list">
          <li class="Filter-item"><input type="checkbox" id="type-shirt"    /><label for="type-shirt">Shirt</label></li>
          <li class="Filter-item"><input type="checkbox" id="type-wedding"  /><label for="type-wedding">Wedding dress</label></li>
          <li class="Filter-item"><input type="checkbox" id="type-cosplay"  /><label for="type-cosplay">Cosplay Costume</label></li>
          <li class="Filter-item"><input type="checkbox" id="type-sweater"  /><label for="type-sweater">Sweater</label></li>
          <li class="Filter-item"><input type="checkbox" id="type-academic" /><label for="type-academic">Academic gown</label></li>
          <li class="Filter-item"><input type="checkbox" id="type-thai"     /><label for="type-thai">Thai costume</label></li>
        </ul>
      </div>

      <hr class="Filter-divider" />

      <div class="Filter-section">
        <h3 class="Filter-title">BRAND</h3>
        <div class="Filter-search">
          <input type="text" placeholder="Search brands..." class="Filter-input" />
        </div>
        <ul class="Filter-list">
          <li class="Filter-item"><input type="checkbox" id="brand-columbia" /><label for="brand-columbia">Columbia</label></li>
          <li class="Filter-item"><input type="checkbox" id="brand-adidas"   /><label for="brand-adidas">Adidas</label></li>
          <li class="Filter-item"><input type="checkbox" id="brand-nike"     /><label for="brand-nike">Nike</label></li>
          <li class="Filter-item"><input type="checkbox" id="brand-gucci"    /><label for="brand-gucci">Gucci</label></li>
          <li class="Filter-item"><input type="checkbox" id="brand-dior"     /><label for="brand-dior">Dior</label></li>
          <li class="Filter-item"><input type="checkbox" id="brand-puma"     /><label for="brand-puma">Puma</label></li>
        </ul>
      </div>

      <hr class="Filter-divider" />

      <div class="Filter-section">
        <h3 class="Filter-title">SEX</h3>
        <div class="Filter-sex-grid">
          <div class="Filter-item"><input type="checkbox" id="sex-unisex"   /><label for="sex-unisex">Unisex</label></div>
          <div class="Filter-item"><input type="checkbox" id="sex-male"     /><label for="sex-male">Male</label></div>
          <div class="Filter-item"><input type="checkbox" id="sex-children" /><label for="sex-children">Children</label></div>
          <div class="Filter-item"><input type="checkbox" id="sex-female"   /><label for="sex-female">Female</label></div>
        </div>
      </div>
    </aside>

    <!-- ── Product Area ── -->
    <main class="ProductArea">

      <!-- Toolbar -->
      <div class="Toolbar">
        <div class="Toolbar-search">
          <img src="images/search.png" alt="search" class="Toolbar-search-icon" />
          <input type="text" placeholder="Search" class="Toolbar-input" />
        </div>
        <div class="Toolbar-right">
          <div class="Toolbar-sort" id="sortBtn">
            <span class="Toolbar-sort-label" id="sortLabel">Sort</span>
            <span class="Toolbar-sort-arrow">∨</span>
            <ul class="Sort-dropdown" id="sortDropdown">
              <li class="Sort-option" data-sort="az">ชื่อ A-Z</li>
              <li class="Sort-option" data-sort="za">ชื่อ Z-A</li>
              <li class="Sort-option" data-sort="price-asc">ราคา ต่ำ-สูง</li>
              <li class="Sort-option" data-sort="price-desc">ราคา สูง-ต่ำ</li>
            </ul>
          </div>
          <span class="Toolbar-view-btn1">1</span>
          <a href="rental2.html" class="Toolbar-view-btn">></a>
        </div>
      </div>

      <!-- Product Grid -->
      <div class="ProductGrid" id="productGrid">


      </div><!-- /ProductGrid -->

    </main>

  </div>

</div>

<script>
(function () {
  /* ── Sort dropdown ── */
  const sortBtn      = document.getElementById('sortBtn');
  const sortDropdown = document.getElementById('sortDropdown');
  const sortLabel    = document.getElementById('sortLabel');
  const grid         = document.getElementById('productGrid');

  sortBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    sortDropdown.classList.toggle('open');
  });

  document.addEventListener('click', function () {
    sortDropdown.classList.remove('open');
  });

  sortDropdown.querySelectorAll('.Sort-option').forEach(function (opt) {
    opt.addEventListener('click', function (e) {
      e.stopPropagation();
      sortLabel.textContent = opt.textContent;
      sortDropdown.classList.remove('open');

      const cards = Array.from(grid.querySelectorAll('.ProductCard'));
      const type  = opt.dataset.sort;

      cards.sort(function (a, b) {
        if (type === 'az')         return a.dataset.name.localeCompare(b.dataset.name);
        if (type === 'za')         return b.dataset.name.localeCompare(a.dataset.name);
        if (type === 'price-asc')  return Number(a.dataset.price) - Number(b.dataset.price);
        if (type === 'price-desc') return Number(b.dataset.price) - Number(a.dataset.price);
        return 0;
      });

      cards.forEach(function (card) { grid.appendChild(card); });
    });
  });
})();
</script><script src="template/api.js"></script>
<script src="template/rental.js"></script>
<script src="user.js"></script>
</body>
</html>
