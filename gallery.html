<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes – Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>

<div class="Page">

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="SiteHeader">

    <!-- Row 1: logo + actions -->
    <div class="SiteHeader-top">
      <div class="SiteHeader-logo">
        <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
        <span class="Logo-text">RENTAL CLOTHES</span>
      </div>
      <div class="SiteHeader-actions">
        <a href="faq.html" class="Icon-faq-link Icon-faq-link--active" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
        <div class="BtnLogin">
          <span class="BtnLogin-text">LOGIN</span>
        </div>
      </div>
    </div>

    <!-- Row 2: navbar -->
    <nav class="Navbar">
      <a href="main.html"      class="NavBtn">HOME</a>
      <a href="rental.html"    class="NavBtn">RENTAL PRODUCTS</a>
      <a href="howtorent.html" class="NavBtn">HOW TO RENT</a>
      <a href="review.html"              class="NavBtn">REVIEW</a>
      <a href="article.html"   class="NavBtn">ARTICLE</a>
      <a href="contact.html"              class="NavBtn">CONTACT</a>
      <a href="gallery.html"   class="NavBtn NavBtn--active">GALLERY</a>
    </nav>

  </header>

  <!-- ══════════════ GALLERY ══════════════ -->

    <ul class="GalleryGrid">

      <li class="GalleryGrid-item">
